# See docs/release.md for the release process and one-time setup.
# Publishes the container image to Docker Hub on every X.Y.Z tag push.

name: Release (Docker Hub)

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$version" ]; then
            echo "tag $tag does not match pyproject version $version" >&2
            exit 1
          fi
      - run: uv run pytest

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/whitehara/portainer-mcp
          # X.Y.Z and X.Y from the git tag. latest=false is load-bearing:
          # metadata-action's default flavor (latest=auto) would otherwise
          # publish :latest for any non-prerelease semver tag (see docs/release.md).
          tags: |
            type=match,pattern=\d+\.\d+\.\d+
            type=match,pattern=(\d+\.\d+)\.\d+,group=1
            type=raw,value=latest

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
